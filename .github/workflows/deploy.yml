name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger local deployment
        run: |
          # Wait a bit for the push to be fully processed
          sleep 5
          # Call the webhook endpoint to trigger deploy on the local machine
          curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" || true
          echo "Deployment triggered"
